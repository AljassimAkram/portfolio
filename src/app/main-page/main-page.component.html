<section class="hero">
  <!-- LINKE SEITE: Profil + Hintergrund -->
  <div class="hero-left">
    <div class="profile-wrapper">
      <!-- Hintergrund hinter Profilbild mit Hover -->
      <div class="profile-bg swap-img">
        <img
          class="img-main"
          src="assets/profile-bg-default.png"
          alt="Background shape"
        />
        <img
          class="img-hover"
          src="assets/profile-bg-hover.png"
          alt="Background shape hover"
        />
        <div class="profile-image">
          <img src="assets/profile.png" alt="Profile" />
        </div>
      </div>

      <!-- Profilbild (bleibt gleich) -->
    </div>
  </div>

  <!-- Logo + Social Icons -->
  <header class="hero-header">
    <!-- Social Icons mit Hover -->
    <nav class="socials">
      <a
        href="mailto:hello@example.com"
        class="social-icon swap-img"
        aria-label="E-Mail"
      >
        <img class="img-main" src="assets/icons/mail-default.png" alt="" />
        <img class="img-hover" src="assets/icons/mail-hover.png" alt="" />
      </a>

      <a
        href="https://github.com/username"
        target="_blank"
        rel="noreferrer"
        class="social-icon swap-img"
        aria-label="GitHub"
      >
        <img class="img-main" src="assets/icons/github-default.png" alt="" />
        <img class="img-hover" src="assets/icons/github-hover.png" alt="" />
      </a>

      <a
        href="https://www.linkedin.com/in/username"
        target="_blank"
        rel="noreferrer"
        class="social-icon swap-img"
        aria-label="LinkedIn"
      >
        <img class="img-main" src="assets/icons/linkedin-default.png" alt="" />
        <img class="img-hover" src="assets/icons/linkedin-hover.png" alt="" />
      </a>
    </nav>
  </header>

  <!-- RECHTE SEITE: Logo, Text, Scroll -->
  <div class="hero-right">
    <div class="logo swap-img">
      <img class="img-main" src="assets/icons/logo-default.png" alt="Logo" />
      <img
        class="img-hover"
        src="assets/icons/logo-hover.png"
        alt="Logo Hover"
      />

      <div class="logo-text">
        <div class="logo-name">A.Al Jassim</div>
        <div class="logo-role">developer</div>
      </div>
    </div>

    <!-- Name + Rolle -->
    <div class="hero-text">
      <h1 class="name">Akram Al Jassim</h1>
      <p class="role">FRONTEND DEVELOPER</p>
    </div>

    <!-- Scroll-Icon (ohne Button) -->
    <div class="scroll-wrapper">
      <div class="scroll-icon swap-img" aria-label="Scroll down">
        <img
          class="img-main"
          src="assets/icons/arrow-default.png"
          alt="Scroll"
        />
        <img
          class="img-hover"
          src="assets/icons/arrow-hover.png"
          alt="Scroll Hover"
        />
      </div>
    </div>
  </div>
</section>
